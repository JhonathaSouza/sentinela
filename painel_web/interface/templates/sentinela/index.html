<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sentinela - Proteção Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body text-center bg-dark text-white rounded">
                        <h2>🛡️ Sistema Sentinela</h2>
                        <p class="mb-0">Análise de Risco em Chats usando Rede Neural LSTM</p>
                    </div>
                </div>
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">Cole o trecho da conversa (em inglês):</label>
                                <textarea class="form-control" name="texto_chat" rows="4" required placeholder="Ex: Hi! How are you today?"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Analisar com IA</button>
                        </form>
                    </div>
                </div>
                {% if resultado %}
                <div class="alert alert-{{ cor_alerta }} shadow-sm text-center">
                    <h4 class="alert-heading">{{ resultado.status }}</h4>
                    <hr>
                    <p class="mb-1"><strong>Texto Analisado:</strong> "{{ resultado.original_text }}"</p>
                    <p class="mb-0"><strong>Certeza do Modelo:</strong> {{ porcentagem }}%</p>
                </div>
                {% endif %}
                {% if erro %}
                <div class="alert alert-warning text-center">{{ erro }}</div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
